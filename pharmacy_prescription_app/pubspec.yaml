name: pharmacy_prescription_app
description: A Flutter app for Pharmacy to receive prescriptions from Doctor App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.1.7
  firebase_auth: ^5.7.0
  
  # QR Code Scanning
  mobile_scanner: ^3.5.6
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  vibration: ^1.8.4
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
